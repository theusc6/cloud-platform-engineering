AWSTemplateFormatVersion: '2010-09-09'
Description: This template creates the secondary central backup KMS Key and Vault required for the automated centralized backup at scale in AWS Organizations using AWS Backup. It should be deployed in the central backup account.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      -
        Label:
          default: AWS Backup Configuration
        Parameters:
          - pEnvironment
          - pOrganizationId
          - pTagKey1
          - pTagValue1
    ParameterLabels:
      pEnvironment:
        default: Environment (prod/dev/uat)
      pOrganizationId:
        default: Organization ID
      pTagKey1:
        default: Tag Key
      pTagValue1:
        default: Tag Value

Parameters:
  pEnvironment:
    Type: String
    Description: Select the environment for the backup vault
    AllowedValues:
      - prod
      - dev
      - uat
    Default: prod

  pOrganizationId:
    Type: String
    Default: o-3jj2faa76f
    Description: AWS Organization ID
    MinLength: 12
    MaxLength: 12
    AllowedPattern: '^o-[a-z0-9]{10,32}$'
    ConstraintDescription: Must start with o- and be 12–32 lowercase alphanumeric characters

  pTagKey1:
    Type: String
    Default: Category
    Description: Tag key to assign to resources

  pTagValue1:
    Type: String
    Default: Backup
    Description: Tag value to assign to resources

Resources:
  rSecondaryCentralAccountBackupKey:
    Type: AWS::KMS::Key
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F76
            reason: The principal is restricted by the condition statement
    Properties:
      Description: Secondary Centralized AWS Backup KMS Key
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Id: default
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: "kms:*"
            Resource: "*"
          - Sid: Allow alias creation during setup
            Effect: Allow
            Principal:
              AWS: "*"
            Action: kms:CreateAlias
            Resource: "*"
            Condition:
              StringEquals:
                kms:CallerAccount: !Ref AWS::AccountId
                kms:ViaService: !Sub cloudformation.${AWS::Region}.amazonaws.com
      Tags:
        - Key: !Ref pTagKey1
          Value: !Ref pTagValue1

  rSecondaryCentralAccountBackupKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/myorg-${pEnvironment}-ctr-backup-key-${AWS::AccountId}-${AWS::Region}
      TargetKeyId: !Ref rSecondaryCentralAccountBackupKey

  rSecondaryCentralBackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub myorg-${pEnvironment}-ctr-secondary-vault-${AWS::Region}
      EncryptionKeyArn: !GetAtt rSecondaryCentralAccountBackupKey.Arn
      AccessPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Allow access to backup vault
            Effect: Allow
            Action: backup:CopyIntoBackupVault
            Resource: "*"
            Principal: "*"
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref pOrganizationId

Outputs:
  oCentralBackupVault:
    Value: !Ref rSecondaryCentralBackupVault
    Description: Central backup vault name

  oCentralKMSKeyAlias:
    Value: !Ref rSecondaryCentralAccountBackupKeyAlias
    Description: KMS key alias for centralized backup encryption
