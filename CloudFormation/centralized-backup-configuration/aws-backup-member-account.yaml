AWSTemplateFormatVersion: '2010-09-09'
Description: This template creates the Backup KMS Key and Vault required for the automated centralized backup at scale in AWS Organizations using AWS Backup. It should be deployed in each member account.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      -
        Label:
          default: AWS Backup Configuration
        Parameters:
          - pEnvironment
          - pOrganizationId
          - pTagKey1
          - pTagValue1
    ParameterLabels:
      pEnvironment:
        default: Environment (prod/dev/uat)
      pOrganizationId:
        default: Organization ID
      pTagKey1:
        default: Enter a Tag Key
      pTagValue1:
        default: Enter a Tag Value

Parameters:
  pEnvironment:
    Type: String
    Description: Select the environment for the backup vault
    AllowedValues:
      - prod
      - dev
      - uat
    Default: prod

  pOrganizationId:
    Type: String
    Default: o-3jj2faa76f
    Description: This is the AWS Organization ID value.
    MinLength: 12
    MaxLength: 12

  pTagKey1:
    Type: String
    Default: Category
    Description: This is the tag key to assign to resources.

  pTagValue1:
    Type: String
    Default: Backup
    Description: This is the tag value to assign to resources.

Resources:
  rMemberAccountBackupKey:
    Type: AWS::KMS::Key
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F76
            reason: The principal is restricted by the condition statement
    Properties:
      Description: Symmetric AWS CMK for Member Account Backup Vault Encryption
      EnableKeyRotation: True
      KeyPolicy:
        Version: "2012-10-17"
        Id: !Sub "myorg-${pEnvironment}-mem-backup-key-${AWS::AccountId}-${AWS::Region}"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: "kms:*"
            Resource: "*"
          - Sid: Allow use of the key by authorized Backup principal
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:role/role-myorg-backup-manager
            Action:
              - kms:DescribeKey
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey
              - kms:GenerateDataKeyWithoutPlaintext
            Resource: "*"
            Condition:
              StringEquals:
                kms:ViaService: !Sub "backup.amazonaws.com"
          - Sid: Allow alias creation during setup
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:CreateAlias
            Resource: "*"
            Condition:
              StringEquals:
                kms:CallerAccount: !Sub ${AWS::AccountId}
                kms:ViaService: !Sub "cloudformation.${AWS::Region}.amazonaws.com"
      Tags:
        - Key: !Ref pTagKey1
          Value: !Ref pTagValue1

  rMemberAccountBackupKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/myorg-${pEnvironment}-mem-backup-key-${AWS::AccountId}-${AWS::Region}"
      TargetKeyId: !Ref rMemberAccountBackupKey

  rMemberAccountBackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub "myorg-${pEnvironment}-mem-backup-vault"
      EncryptionKeyArn: !GetAtt rMemberAccountBackupKey.Arn
      AccessPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Allow access to backup vault
            Effect: Allow
            Action: backup:CopyIntoBackupVault
            Resource: "*"
            Principal: "*"
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref pOrganizationId

Outputs:
  oMemberAccountBackupVault:
    Value: !Ref rMemberAccountBackupVault
    Description: Backup vault name

  oMemberAccountKMSKey:
    Value: !Ref rMemberAccountBackupKey
    Description: KMS key used for backup encryption

  oMemberAccountKMSKeyAlias:
    Value: !Ref rMemberAccountBackupKeyAlias
    Description: Alias for the backup encryption KMS key
