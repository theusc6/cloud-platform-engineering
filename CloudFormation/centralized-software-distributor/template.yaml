  #   Default: ''
  # ScheduleExpression2:
  #   Type: String
  #   Description: 'The Schedule Expression for the AWS Systems Manager Association for the second package. Examples are "rate(30 minutes)", "rate(1 day)", "rate(7 days)"'
  #   Default: 'cron(0 6 ? * SUN *)'
  # TargetResourceTagKey2:
  #   Type: String
  #   Description: The AWS Systems Manager Tag Key for the target for the second package.
  #   Default: 'AutoDeploy'
  # TargetResourceTagValue2:
  #   Type: String
  #   Description: The AWS Systems Manager Tag Value for the target for the second package.
  #   Default: 'splunk'

Conditions:
  CreateNewLogsBucket: !Equals [!Ref CreateLogsBucket, 'true']

