AWSTemplateFormatVersion: '2010-09-09'
Description: 'Stackset to create Systems Manager Distributor Package(s) & State Manager Association(s)'

Parameters:
  PackageName1:
    Type: String
    Description: Required. Provide a name for the first package
    Default: 'XDR'
  S3PackageBucketFolder1:
    Type: String
    Description: Name of the S3 Bucket Folder where the first package manifest is uploaded
    Default: 'xdr'
  Version1:
    Type: String
    Description: Required. Provide the exact version name from the first package manifest file
    Default: '1.0.0'
  AssociationName1:
    Type: String
    Description: Optional. Provide a name for the first Association.
    Default: 'CSD-PackageDistributor-XDR'
  Action1:
    Type: String
    Description: Required. Specify whether to install or uninstall the first package.
    Default: 'Install'
    AllowedValues:
      - 'Install'
      - 'Uninstall'
  InstallationType1:
    Type: String
    Description: Optional. Specify the type of installation for the first package.
    Default: 'Uninstall and reinstall'
    AllowedValues:
      - 'Uninstall and reinstall'
      - 'In-place update'
  CreateLogsBucket:
    Type: String
    Description: 'Indicate whether to create a new S3 logs bucket or use an existing one (true/false)'
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
  OutputS3KeyPrefix1:
    Type: String
    Description: The S3 Key Prefix used for AWS Systems Manager Run Command Output for the first package.
    Default: 'xdr'
  ScheduleExpression1:
    Type: String
    Description: 'The Schedule Expression for the AWS Systems Manager Association for the first package. Examples are "rate(30 minutes)", "rate(1 day)", "rate(7 days)"'
    Default: 'cron(0 6 ? * SUN *)'
  TargetResourceTagKey1:
    Type: String
    Description: The AWS Systems Manager Tag Key for the target for the first package.
    Default: 'AutoDeploy'
  TargetResourceTagValue1:
    Type: String
    Description: The AWS Systems Manager Tag Value for the target for the first package.
    Default: 'xdr'

  # The below parameters are going to be implemented at a later date 
  
  # PackageName2:
