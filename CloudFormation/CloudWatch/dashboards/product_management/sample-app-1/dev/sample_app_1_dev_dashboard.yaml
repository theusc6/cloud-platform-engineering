AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch dashboard for monitoring application services

Parameters:
  DashboardName:
    Type: String
    Description: Name for the CloudWatch dashboard
    Default: sample-app-dashboard
  ApiName:
    Type: String
    Description: API Gateway API name to monitor
    Default: MyApiName
  LoadBalancerName:
    Type: String
    Description: ALB name to monitor
    Default: MyLoadBalancerName
  LambdaFunctionName:
    Type: String
    Description: Lambda function name to monitor
    Default: MyFunctionName

Resources:
  CloudWatchDashboard:
    Type: 'AWS::CloudWatch::Dashboard'
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ApiGateway", "Count", "ApiName", "MyApiName" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "API Gateway Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ApplicationELB", "RequestCount", "LoadBalancer", "MyLoadBalancerName" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "Application ELB Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/CertificateManager", "TotalCertificates", {} ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "Certificate Manager Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 18,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Config", "ResourceCount", "ResourceType", "AWS::DynamoDB::Table" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "Config Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 24,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "MyDynamoDBTableName" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "DynamoDB Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 30,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Events", "Invocations", "RuleName", "MyRuleName" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "Events Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 36,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Firehose", "DeliveryToS3.Records", "DeliveryStreamName", "MyDeliveryStreamName" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "Firehose Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 42,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/HealthLake", "DomainCount", {} ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "HealthLake Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 48,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "MyFunctionName" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "Lambda Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 54,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Logs", "IncomingBytes", "LogGroupName", "MyLogGroupName" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "Logs Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 60,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/S3", "BucketSizeBytes", "BucketName", "MyBucketName" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "S3 Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 66,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/SNS", "NumberOfMessagesPublished", "TopicName", "MyTopicName" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "SNS Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 72,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/SecretsManager", "NumberOfSecrets", {} ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "SecretsManager Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 78,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/States", "ExecutionTime", "StateMachineArn", "MyStateMachineArn" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "States Metrics"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 84,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Usage", "UsageCount", {} ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "title": "Usage Metrics"
              }
            }
          ]
        }
