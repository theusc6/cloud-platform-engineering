<!DOCTYPE html>
<html lang="en">
<head>
	<title>S3 Bucket Enforcement Results</title>
	<style>
		body {
			background-color: #1c1c1c;
			color: #fff;
			font-family: Arial, sans-serif;
			font-size: 16px;
			line-height: 1.6;
		}
		h1 {
			font-size: 24px;
			margin-top: 0;
			text-align: center;
		}
		table {
			border-collapse: collapse;
			margin: 20px auto;
			width: 80%;
		}
		th, td {
			border: 1px solid #fff;
			padding: 8px;
			text-align: center;
		}
		th {
			background-color: #444;
			color: #fff;
		}
		tr:nth-child(even) {
			background-color: #333;
		}
	</style>
</head>
<body>
	<h1>S3 Bucket Enforcement Results</h1>
	<table>
        <caption>Monthly sales figures</caption>
		<tr>
			<th>Check</th>
			<th>Result</th>
		</tr>
		{% for check, result in results.items() %}
		<tr>
			<td>{{ check }}</td>
			<td>{% if result %}<span style="color: green;">Passed</span>{% else %}<span style="color: red;">Failed</span>{% endif %}</td>
		</tr>
		{% endfor %}
	</table>
	<p><a href="/">Go back to main page</a></p>
</body>
</html>
